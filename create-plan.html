<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link
    rel="icon"
    type="image/png"
    href="./assets/favicon.png"
  />

  <title>Crear Plan</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body class="bg-gradient-to-b from-[#F8FAFC] to-[#EEF4FA] min-h-screen">

  <!-- MAIN -->
  <main class="max-w-3xl mx-auto px-6 py-10 pb-40">

    <!-- TOP -->
    <section class="mb-10">

      <div class="flex items-center justify-between mb-8">

        <!-- BACK -->
        <button
          onclick="window.location.href='home.html'"
          class="w-14 h-14 rounded-2xl bg-white shadow-lg flex items-center justify-center text-2xl"
        >
          ←
        </button>

        <!-- TITLE -->
        <div class="text-right">

          <p class="text-gray-400 text-sm mb-1">
            Marina Community
          </p>

          <h1 class="text-4xl font-bold text-[#0B1F3A]">
            Create Plan
          </h1>

        </div>

      </div>

    </section>

    <!-- FORM CARD -->
    <section
      class="bg-white rounded-[40px] shadow-[0_20px_60px_rgba(0,0,0,0.08)] p-8 md:p-10"
    >

      <form id="createPlanForm" class="space-y-8">

        <!-- TITLE -->
        <div>

          <label
            class="block text-[#0B1F3A] font-semibold mb-3"
          >
            Título del Plan (*)
          </label>

          <input
            id="planTitle"
              required
            type="text"
            placeholder="Noche de Películas en la Terraza"
            class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9] transition-all"
          >

        </div>

        <!-- DESCRIPTION -->
        <div>

          <label
            class="block text-[#0B1F3A] font-semibold mb-3"
          >
            Descripción  (*)
          </label>

          <textarea
            id="planDescription"
            required
            rows="5"
            placeholder="Describe tu plan comunitario..."
            class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9] transition-all resize-none"
          ></textarea>

        </div>

        <!-- DATE & TIME -->
        <div class="grid md:grid-cols-2 gap-6">

          <!-- DATE -->
          <div>

            <label
              class="block text-[#0B1F3A] font-semibold mb-3"
            >
              Fecha  (*)
            </label>

            <input
              id="planDate"
              type="date"
              required
              class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9]"
            >

          </div>

          <!-- TIME -->
          <div>

            <label
              class="block text-[#0B1F3A] font-semibold mb-3"
            >
              Hora  (*)
            </label>

            <input
              id="planTime"
              type="time"
              required
              class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9]"
            >

          </div>

        </div>

        <!-- LOCATION -->
        <div>

          <label
            class="block text-[#0B1F3A] font-semibold mb-3"
          >
            Ubicación  (*)
          </label>

          <select
            id="planLocation"
            required
            class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9]"
          >

            <option value="">
              Selecciona ubicación - Piso 21
            </option>

            <option>
              Terraza
            </option>

            <option>
              Sala Bar
            </option>

            <option>
              Sala Lounge
            </option>

            <option>
              Piscina
            </option>            

            <option>
              Terraza
            </option>

            <option>
              Outside Marina
            </option>

          </select>

        </div>

        <!-- CATEGORY -->
        <div>

          <label class="text-[#0B1F3A] font-semibold block mb-4">
            Categoría 
          </label>

          <!-- HIDDEN -->
          <input
            type="hidden"
            id="selectedCategory"
            value="Social"
          >

          <!-- OPTIONS -->
          <div class="flex flex-wrap gap-4">

            <!-- SOCIAL -->
            <button
              type="button"
              data-category="Social"
              data-active="blue"
              class="category-btn active-category bg-blue-100 text-blue-600 px-6 py-4 rounded-2xl font-semibold transition-all duration-300"
            >
              Social
            </button>

            <!-- SPORTS -->
            <button
              type="button"
              data-category="Sports"
              data-active="orange"
              class="category-btn bg-orange-100 text-orange-500 px-6 py-4 rounded-2xl font-semibold transition-all duration-300"
            >
              Sports
            </button>

            <!-- CHILL -->
            <button
              type="button"
              data-category="Chill"
              data-active="purple"
              class="category-btn bg-purple-100 text-purple-500 px-6 py-4 rounded-2xl font-semibold transition-all duration-300"
            >
              Chill
            </button>

            <!-- OUTDOOR -->
            <button
              type="button"
              data-category="Outdoor"
              data-active="green"
              class="category-btn bg-green-100 text-green-600 px-6 py-4 rounded-2xl font-semibold transition-all duration-300"
            >
              Outdoor
            </button>

          </div>

        </div>

        <!-- COVER SELECTOR -->
        <div>

          <label
            class="block text-[#0B1F3A] font-semibold mb-4"
          >
            Elegir Estilo de Portada (*)
          </label>

          <select
            id="planCover"
            required
            class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9]"
          >
            <option value="">
              Selecciona una portada premium
            </option>

            <option value="sports-meetup">
              Plan de Deporte - Masculino
            </option>

            <option value="sports-night">
              Plan de Deporte - Femenino
            </option>            

            <option value="movie-night">
              Noche de Películas
            </option>

            <option value="rooftop-party">
              Fiesta en la Terraza
            </option>

            <option value="sunset-lounge">
              Atardecer Lounge
            </option>

            <option value="gaming-night">
              Gaming Night
            </option>

            <option value="pool-party">
              Pool Party
            </option>

            <option value="bbq-night">
              BBQ Night
            </option>

            <option value="networking">
              Networking Event
            </option>

            <option value="wine-night">
              Noche de Vinos
            </option>

            <option value="coffee-meet">
              Coffee Meetup
            </option>

          </select>

        </div>

        <!-- WHATSAPP LINK -->
        <div>

          <label
            class="block text-[#0B1F3A] font-semibold mb-3"
          >
            Link del Grupo de WhatsApp
          </label>

          <input
            id="planWhatsapp"
            type="url"
            placeholder="https://chat.whatsapp.com/..."
            class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9]"
          >

        </div>

        <!-- CAPACITY -->
        <div>

          <label
            class="block text-[#0B1F3A] font-semibold mb-3"
          >
            Capacidad (*)
          </label>

          <input
            id="planCapacity"
            type="number"
            required
            placeholder="20"
            class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9]"
          >

        </div>

        <!-- RECOMMENDATIONS -->
        <div>

          <label
            class="block text-[#0B1F3A] font-semibold mb-3"
          >
            Recomendaciones
          </label>

          <textarea
            id="planRecommendations"
            rows="4"
            placeholder="¿Qué deberían traer los vecinos?"
            class="w-full bg-[#F4F7FB] rounded-2xl px-6 py-5 outline-none border border-transparent focus:border-[#5DA9E9] resize-none"
          ></textarea>

        </div>

        <!-- BUTTONS -->
        <div class="flex flex-col md:flex-row gap-5 pt-6">

          <!-- PREVIEW -->
          <button
            id="previewPlanBtn"
            type="button"
            class="w-full bg-[#E8EEF5] text-[#0B1F3A] py-5 rounded-2xl font-semibold text-lg hover:bg-[#DCE7F3] transition-all duration-300"
          >
            Vista Previa
          </button>

          <!-- PUBLISH -->
          <button
            id="publishPlanBtn"
            type="submit"
            class="w-full bg-[#5DA9E9] hover:bg-[#79bbf0] text-white py-5 rounded-2xl font-semibold text-lg transition-all duration-300 shadow-xl"
          >
            Publicar Plan
          </button>

        </div>

      </form>

    </section>

  </main>

  <!-- BOTTOM NAV -->
  <div id="navbarContainer"></div>

  <script
    type="module"
    src="./js/create-plan.js">
  </script>

  <script
    type="module"
    src="./js/auth-guard.js">
  </script>

  <script
    type="module"
    src="./js/load-components.js">
  </script>


    <!-- PREVIEW MODAL -->
    <div
      id="previewModal"
      class="fixed inset-0 bg-black/60 backdrop-blur-xl z-[99999] hidden items-center justify-center p-6"
    >

      <!-- CONTENT -->
      <div
        id="previewContent"
        class="w-full max-w-2xl"
      ></div>

    </div>

</body>
</html>
