<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link
    rel="icon"
    type="image/png"
    href="./assets/favicon.png"
  />

  <title>Recover Password</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="./css/styles.css"
  >

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- BACKGROUND -->
  <section
    class="relative min-h-screen overflow-hidden flex items-center justify-center px-6 py-10"
  >

    <!-- BG -->
    <img
      src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=2000&auto=format&fit=crop"
      class="absolute inset-0 w-full h-full object-cover"
    >

    <!-- OVERLAY -->
    <div
      class="absolute inset-0 bg-[#081C35]/75"
    ></div>

    <!-- CARD -->
    <div
      class="relative z-20 w-full max-w-lg"
    >

      <div
        class="bg-white/10 border border-white/15 backdrop-blur-3xl rounded-[42px] px-8 py-10 md:px-10 md:py-12 shadow-[0_25px_80px_rgba(0,0,0,0.35)]"
      >

        <!-- LOGO -->
        <div class="flex justify-center mb-8">

          <img
            src="./assets/logos/marina-logo-white.png"
            class="h-16 md:h-20 object-contain"
          >

        </div>

        <!-- TITLE -->
        <div class="text-center mb-10">

          <h1
            class="text-white text-4xl font-bold mb-3"
          >
            Recuperar Contraseña
          </h1>

          <p
            class="text-white/70"
          >
            Te enviaremos un enlace de recuperación
          </p>

        </div>

        <!-- FORM -->
        <form
          id="forgotPasswordForm"
          class="space-y-7"
        >

          <!-- EMAIL -->
          <div>

            <label
              class="text-white text-sm font-medium block mb-3"
            >
              Correo
            </label>

            <input
              id="resetEmail"
              type="email"
              required
              placeholder="resident@email.com"
              class="w-full bg-transparent border-b border-white/30 py-4 text-white placeholder:text-white/40 outline-none focus:border-[#5DA9E9] transition-all duration-300"
            >

          </div>

          <!-- BUTTON -->
          <button
            type="submit"
            class="w-full bg-white hover:bg-[#F3F7FB] text-[#081C35] py-4 rounded-full text-lg font-bold tracking-[0.12em] uppercase transition-all duration-300"
          >
            Enviar Enlace
          </button>

          <p class="text-white/40 text-xs text-center mt-4 leading-relaxed">
            Si no encuentras el correo, revisa spam o promociones.
          </p>

        </form>

        <!-- BACK -->
        <div class="text-center mt-8">

          <button
            onclick="window.location.href='login.html'"
            class="text-white/80 hover:text-white text-sm transition-all duration-300"
          >
            Volver al login
          </button>

        </div>

      </div>

    </div>

  </section>

  <!-- JS -->
  <script
    type="module"
    src="./js/forgot-password.js">
  </script>

</body>

</html>
