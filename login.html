<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- FAVICON -->
  <link
    rel="icon"
    type="image/png"
    href="./assets/favicon.png"
  />

  <title>Marina Community</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="./css/styles.css"
  >

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- BACKGROUND -->
  <section
    class="relative min-h-screen overflow-hidden flex items-center justify-center px-6 py-10"
  >

    <!-- BG IMAGE -->
    <img
      src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=2000&auto=format&fit=crop"
      class="absolute inset-0 w-full h-full object-cover"
    >

    <!-- DARK OVERLAY -->
    <div
      class="absolute inset-0 bg-[#081C35]/65 backdrop-blur-[2px]"
    ></div>

    <!-- LIGHT GRADIENT -->
    <div
      class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/40"
    ></div>

    <!-- LOGIN CARD -->
    <div
      class="relative z-20 w-full max-w-md"
    >

      <div
        class="bg-white/10 border border-white/20 backdrop-blur-3xl rounded-[38px] px-8 py-10 md:px-10 md:py-12 shadow-[0_25px_80px_rgba(0,0,0,0.35)]"
      >

        <!-- LOGO -->
        <div class="flex justify-center mb-10">

          <img
            src="./assets/logos/marina-logo-white.png"
            class="h-16 md:h-20 object-contain"
          >

        </div>

        <!-- TITLE -->
        <div class="text-center mb-10">

          <h1
            class="text-white text-4xl md:text-5xl font-bold mb-3 tracking-tight"
          >
            Marina
          </h1>

          <p
            class="text-white/70 text-base md:text-lg"
          >
            Accede a tu comunidad privada
          </p>

        </div>

        <!-- FORM -->
        <form
          id="loginForm"
          class="space-y-7"
        >

          <!-- EMAIL -->
          <div>

            <label
              class="text-white text-sm font-medium block mb-3"
            >
              Correo
            </label>

            <input
              id="loginEmail"
              type="email"
              required
              placeholder="correo@marina.com"
              class="w-full bg-transparent border-b border-white/30 py-4 text-white placeholder:text-white/40 outline-none focus:border-[#5DA9E9] transition-all duration-300"
            >

          </div>

          <!-- PASSWORD -->
          <div>

            <label
              class="text-white text-sm font-medium block mb-3"
            >
              Contraseña
            </label>

            <input
              id="loginPassword"
              type="password"
              required
              placeholder="••••••••"
              class="w-full bg-transparent border-b border-white/30 py-4 text-white placeholder:text-white/40 outline-none focus:border-[#5DA9E9] transition-all duration-300"
            >

          </div>

          <!-- LOGIN BUTTON -->
          <button
            type="submit"
            class="w-full mt-6 bg-white hover:bg-[#F3F7FB] text-[#081C35] py-4 rounded-full text-xl font-bold transition-all duration-300 hover:scale-[1.02] shadow-[0_10px_30px_rgba(255,255,255,0.15)]"
          >
            Ingresar
          </button>

        </form>

        <!-- EXTRA -->
        <div class="mt-8 text-center space-y-4">

          <!-- REGISTER -->
          <button
            onclick="window.location.href='register.html'"
             class="text-white/60 hover:text-white relative transition-all duration-300 text-sm font-medium after:absolute after:left-0 after:-bottom-1 after:h-[1px] after:w-0 after:bg-[#EC0F7E] hover:after:w-full after:transition-all after:duration-300"
          >
            Crear nueva cuenta
          </button>

          <!-- FORGOT -->
          <br>
          <button
            onclick="window.location.href='forgot-password.html'"
            class="text-white/60 hover:text-white relative transition-all duration-300 text-sm font-medium after:absolute after:left-0 after:-bottom-1 after:h-[1px] after:w-0 after:bg-[#5DA9E9] hover:after:w-full after:transition-all after:duration-300"
          >
            Olvidé mi contraseña
          </button>

        </div>

      </div>

    </div>

  </section>

  <!-- LOGIN JS -->
  <script
    type="module"
    src="./js/login.js">
  </script>

</body>

</html>
