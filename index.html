<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="./assets/favicon.png" />

  <title>Marina City Center</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

  <!-- HERO SECTION -->
  <section
    class="relative min-h-screen bg-cover bg-center flex items-center justify-center px-6"
    style="background-image: url('./assets/images/landing-bg.png');"
  >

    <!-- DARK OVERLAY -->
    <div class="absolute inset-0 bg-black/55 backdrop-blur-[2px]"></div>

    <!-- NAVBAR -->
    <nav class="absolute top-0 left-0 w-full z-20 px-6 md:px-10 py-6">

    <div
        class="max-w-7xl mx-auto flex items-center justify-between bg-white/5 border border-white/10 backdrop-blur-2xl rounded-3xl px-6 py-4"
    >

        <!-- LOGO -->
        <div class="flex items-center gap-4">

        <img
            src="./assets/logos/marina-logo-white.png"
            alt="Marina Logo"
            class="h-10 md:h-12 object-contain"
        >

        </div>

        <!-- RIGHT -->
        <div class="flex items-center gap-4">

        <!-- ACCESS BUTTON -->
        <button
            onclick="window.location.href='login.html'"
            class="bg-[#5DA9E9] hover:bg-[#79bbf0] text-white px-6 py-3 rounded-2xl font-semibold transition-all duration-300 hover:scale-105 shadow-xl"
        >
            Resident Access
        </button>

        </div>

    </div>

    </nav>

    <!-- CONTENT -->
    <div
    class="relative z-10 w-full max-w-3xl text-center bg-white/10 border border-white/10 backdrop-blur-3xl rounded-[40px] px-8 py-14 md:px-16 md:py-20 shadow-2xl"
    >

      <!-- TITLE -->
      <h1
        class="text-white text-5xl md:text-8xl font-extrabold leading-tight mb-6"
      >
        Marina City Center
      </h1>

      <!-- SUBTITLE -->
        <p
        class="text-gray-200 text-lg md:text-2xl leading-relaxed mb-12 max-w-2xl mx-auto"
        >
        A private luxury residential platform designed
        to connect neighbors through premium shared
        experiences inside Marina City Center.
        </p>

      <!-- BUTTONS -->
        <div class="flex flex-col md:flex-row gap-5 justify-center">

        <!-- PRIMARY -->
        <button
            onclick="window.location.href='login.html'"
            class="bg-[#5DA9E9] hover:bg-[#79bbf0] text-white px-10 py-5 rounded-2xl text-lg font-semibold shadow-2xl transition-all duration-300 hover:scale-105"
        >
            Enter Community
        </button>

        <!-- SECONDARY -->
        <button
            class="bg-white/10 border border-white/20 text-white px-10 py-5 rounded-2xl text-lg font-semibold backdrop-blur-xl hover:bg-white/20 transition-all duration-300"
        >
            Explore Plans
        </button>

        </div>

    </div>

  </section>

  <script src="./js/app.js"></script>

</body>
</html>
