<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <link rel="icon" type="image/png" href="./assets/favicon.png" />

  <title>Profile</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="./css/styles.css"
  >

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body class="bg-gradient-to-b from-[#F8FAFC] to-[#EEF4FA] min-h-screen">

  <!-- MAIN -->
  <main
    id="profileContainer"
    class="max-w-5xl mx-auto pb-40"

    <div class="flex items-center justify-center py-40">

      <p class="text-gray-400 text-xl">
        Loading profile...
      </p>

    </div>

  </main>

  <!-- BOTTOM NAV -->
  <div id="navbarContainer"></div>

  <!-- SCRIPTS -->
  <script
    type="module"
    src="./js/profile.js">
  </script>

  <script
    type="module"
    src="./js/auth-guard.js">
  </script>

  <script
    type="module"
    src="./js/logout.js">
  </script>

  <script
    type="module"
    src="./js/load-components.js">
  </script>

</html>
